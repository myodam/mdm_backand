spring:
  # ── H2 인메모리 DB (테스트 전용) ──────────────────────────
  datasource:
    url: jdbc:h2:mem:mbm_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: none          # Flyway가 DDL 담당
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # H2 사용 시 dialect 자동 감지
        dialect: org.hibernate.dialect.H2Dialect

  # ── Flyway: 테스트 전용 SQL 경로 사용 ──────────────────────
  # 운영 SQL(ENGINE=InnoDB 등 MySQL 문법) 대신
  # H2 호환 SQL을 test/resources/db/migration-h2/ 에서 읽음
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    baseline-on-migrate: true

# ── AI 서버 URL: 테스트에서는 Mock으로 대체하므로 더미값 ──────
ai:
  server:
    url: http://localhost:8000

logging:
  level:
    com.ux.mbm: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG