spring:
  application:
    name: mbm

  # =====================
  # MySQL 로컬
  # =====================
  datasource:
    url: jdbc:mysql://localhost:3306/mbm?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # =====================
  # Flyway
  # create-schemas 제거 (MySQL에서 오류 유발)
  # =====================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

ai:
  server:
    url: http://localhost:8000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.ux.mbm: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG