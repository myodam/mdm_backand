name: Deployment Workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🌟 JDK 자동 설치 및 세팅 단계 (서버에 JDK가 없어도 됨!)
      - name: JDK 설치
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # setup-java가 PATH를 알아서 잡아주기 때문에 export 명령어 없이 바로 실행 가능합니다.
        run: ./gradlew clean build

      - name: Build Docker Image
        run: sudo docker build -t mbm-image .

      - name: Make Script Executable
        run: sudo chmod +x deployment.sh

      - name: Run Deployment Script
        # 인자: [이미지명] [앱 컨테이너명] [포트] [DB 컨테이너명]
        run: sudo ./deployment.sh mbm-image mbm-app 8080 mbm-mysql
